{% extends "base.html" %}
{% load crispy_forms_filters %}
{% load crispy_forms_tags %}

{% block title %}Nuovo Post{% endblock %}

{% block content %}
<div class="col-12 col-lg-10 px-md-5 py-4">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4">
            <h3 class="fw-bold mb-0">New post</h3>
        </div>

        <div class="card-body p-4">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="row g-4">

                    <div class="col-12 col-md-6 d-flex flex-column">
                        <div class="border rounded-3 p-2 h-100 d-flex flex-column bg-white">

                            {{ form.description|as_crispy_field }}

                            <div class="d-flex justify-content-between align-items-center text-muted px-2 pt-2 border-top mt-2">
                                <div class="d-flex gap-3 fs-5">
                                    <i class="bi bi-emoji-smile cursor-pointer hover-icon"></i>
                                    <i class="bi bi-hash cursor-pointer hover-icon"></i>
                                </div>
                                <small class="text-secondary">0 / 100</small>
                            </div>
                        </div>
                    </div>

                </div>

                <div class="d-flex justify-content-end gap-3 mt-4 pt-3 border-top">
                    <a href="{% url 'feed:home' %}" class="btn btn-light fw-medium px-4 border">Exit</a>
                    <button type="submit" class="btn btn-primary fw-medium px-4">Post</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
