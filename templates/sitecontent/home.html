{% extends "base.html" %}

{% block title %}Home - SocialNetwork{% endblock %}

{% block navbar %}
<nav class="navbar sticky-top shadow-sm px-4 flex-nowrap">

    <a class="navbar-brand d-flex align-items-center gap-2 m-0">
        <i class="bi bi-camera-fill brand-icon"></i>
        <span class="fw-bold brand-text">SocialNetwork</span>
    </a>

    <div class="d-flex align-items-center gap-3 gap-md-4">

        <div class="nav-icon-btn position-relative">
            <i class="bi bi-bell nav-icon"></i>
            <span class="position-absolute translate-middle badge rounded-pill bg-danger border border-white notification-badge"></span>
        </div>

        <div class="nav-icon-btn">
            <i class="bi bi-chat nav-icon"></i>
        </div>

        <div class="nav-icon-btn d-flex align-items-center gap-2 ms-2">
            <img src="https://ui-avatars.com/api/?name={{ user.username }}&background=0D8ABC&color=fff" class="rounded-circle object-fit-cover" width="40" height="40" alt="Profile">

            <div class="d-none d-lg-flex flex-column lh-1 text-start">
                <span class="fw-bold profile-name">{{ user.username }}</span>
                <span class="text-muted profile-handle">@{{ user.username|lower }}</span>
            </div>

            <i class="bi bi-chevron-down text-muted ms-1 profile-chevron"></i>
        </div>
    </div>
</nav>
{% endblock %}
{% block content %}
<main class="row mt-4">

   <aside class="d-none d-md-block col-md-4 col-lg-2">

    <div class="side-content position-sticky d-flex flex-column gap-4">

        <a href="#" class="sidebar-link active">
            <i class="bi bi-camera-fill"></i>
            <span>Home</span>
        </a>

        <a href="#" class="sidebar-link">
            <i class="bi bi-compass"></i>
            <span>Explore</span>
        </a>

        <a href="#" class="sidebar-link">
            <i class="bi bi-envelope"></i>
            <span>Messages</span>
        </a>

        <a href="#" class="sidebar-link">
            <div class="d-flex align-items-center gap-3">
                <div class="position-relative">
                    <i class="bi bi-bell"></i>
                        <span class="notification-dot"></span>
                </div>
                        <span>Notifications</span>
            </div>
            <span class="badge rounded-pill ms-auto px-2 py-1 sidebar-badge"></span>
        </a>

        <a href="#" class="sidebar-link">
            <i class="bi bi-person"></i>
            <span>Profile</span>
        </a>

        <button class="btn btn-create-post text-white py-2 mt-3 shadow-sm fs-5">
            Add Post
        </button>
    </div>
</aside>

</main>
{% endblock %}
