<div class="trend-card position-relative">
    <img src="{{ news.image_url|default:'https://picsum.photos/seed/news/80/80' }}" alt="{{ news.title }}" class="trend-img">
    <div class="trend-text">
        <h3 class="trend-title">
            <a href="{% url 'posts:post_detail' news.id %}" class="text-decoration-none text-dark stretched-link">
                {{ news.title }}
            </a>
        </h3>

        <span class="trend-source position-relative z-3">
            Author:
            <a href="{% url 'users:profile' news.author.username %}" class="text-decoration-none text-secondary">
                {{ news.author.username }}
            </a>
        </span>

        <span class="trend-snippet">{{ news.description|truncatechars:80 }}</span>
    </div>
</div>
