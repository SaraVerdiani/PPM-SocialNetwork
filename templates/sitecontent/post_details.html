{% extends "base.html" %}

{% block title %}Post written by {{ post.author.username }}{% endblock %}

{% block content %}
<div class="col-12 col-md-8 col-lg-6 mx-auto pt-4">

    <a href="{{ back_url }}" class="text-decoration-none text-dark d-inline-flex align-items-center gap-2 mb-4 fw-medium">
        <i class="bi bi-arrow-left fs-5"></i> Back
    </a>

    {% include 'sitecontent/post.html' with post=post %}

</div>
{% endblock %}
