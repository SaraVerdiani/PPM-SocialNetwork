<div class="col-6 col-md-3 small-post-col">
    <a href="{% url 'posts:post_detail' post.id %}" class="small-post-link text-decoration-none">
        {% if post.is_pinned %}
        <div class="pin-icon-wrapper">
            <i class="bi bi-pin-angle-fill pin-icon"></i>
        </div>
    {% endif %}
        <div class="profile-grid-text shadow-sm">
            <i class="bi bi-quote small-post-quote-icon"></i>
            <span class="small-post-text-preview">
                {{ post.description|truncatechars:60 }}
            </span>
        </div>

    </a>
</div>
