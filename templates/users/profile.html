{% extends "base.html" %}

{% block title %}Profile{% endblock %}

{% block content %}
<div class="col-12 col-lg-10 px-md-5 py-4">

    <div class="profile-header bg-white p-4 rounded-4 shadow-sm mb-4">
        
        <div class="row mb-3">
            <div class="col-auto">
                <img src="https://picsum.photos/seed/user_avatar/150/150" alt="Profile Avatar" class="profile-avatar rounded-circle border border-2 border-white shadow-sm">
            </div>
            
            <div class="col ps-md-4 pt-2">
                <div class="d-flex gap-4 gap-md-5 mb-3 text-center text-md-start">
                    <div>
                        <span class="fs-4 fw-bold d-block lh-1 mb-1">128</span>
                        <span class="text-dark">Post</span>
                    </div>
                    <div>
                        <span class="fs-4 fw-bold d-block lh-1 mb-1">3.2k</span>
                        <span class="text-dark">Follower</span>
                    </div>
                    <div>
                        <span class="fs-4 fw-bold d-block lh-1 mb-1">450</span>
                        <span class="text-dark">Following</span>
                    </div>
                </div>
                
                <div class="profile-bio d-none d-md-block">
                    <p class="mb-1 text-dark">Description</p>
                    <p class="mb-1 text-dark">Description</p>
                    <p class="mb-0 text-dark">Description</p>
                </div>
            </div>
        </div>

        <div class="row align-items-end mt-1">
            <div class="col-md-8">
                <h3 class="fw-bold mb-0">{{ user.username }}</h3>
                <p class="text-muted mb-2">@{{ user.username }}</p>
                
                <div class="profile-bio d-md-none mb-3">
                    <p class="mb-1 text-dark">Description</p>
                    <p class="mb-1 text-dark">Description</p>
                    <p class="mb-0 text-dark">Description</p>
                </div>

                <p class="mb-0 text-dark small d-flex align-items-center gap-1">
                    Description
                </p>
            </div>
            
            <div class="col-md-4 text-start text-md-end mt-3 mt-md-0">
                <button class="btn btn-primary fw-medium px-4 py-2 rounded-3 w-100 btn-edit-profile">
                    Edit Profile
                </button>
            </div>
        </div>
    </div>

    <div class="profile-grid">
        <div class="row g-2 g-md-3">

    </div>
    </div>
</div>
{% endblock %}
