{% extends "base.html" %}
{% load crispy_forms_filters %}
{% load crispy_forms_tags %}

{% block title %}Sign up{% endblock %}

{% block authentication %}
<div class="authentication-wrapper container">
    <div class="row justify-content-center w-100 mx-auto">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="authentication-title-container text-center">
                <h1>Social network</h1>
            </div>
            <div class="authentication-card">
                <div class="authentication-card-body">
                    <h2 class="authentication-heading text-center">Sign up</h2>
                    <form method="POST">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <button type="submit" class="btn btn-primary btn-signup mt-3">Register</button>
                    </form>
                    <div class="signup-footer text-center mt-3">
                        <p>Already signed up? <a href="{% url 'users:login' %}">Log in here</a></p>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
