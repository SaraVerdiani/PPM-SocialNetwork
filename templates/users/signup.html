{% extends "base.html" %}
{% load crispy_forms_filters %}
{% load crispy_forms_tags %}

{% block title %}Sign up{% endblock %}

{% block authentication %}
<div class="center d-flex justify-content-center align-items-center w-100" style="min-height: 80vh;">
    <div class="col-12 col-md-6 col-lg-3">
        <div class="title d-flex justify-content-center align-items-center mb-4">
            <h1>Social network</h1>
        </div>
        <div class="card shadow-sm">
            <div class="card-body p-5">
                <h2 class="mb-4 text-center">Sign up</h2>
                <form method="POST">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100 mt-3">Register</button>
                </form>
                <div class="mt-3 text-center">
                    <p>Already signed up? <a href="{% url 'users:login' %}">Log in here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
